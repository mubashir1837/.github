name: Mubashir AI Smart Activity Bot

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl

      - name: Create commits.md if not exists
        run: |
          if [ ! -f commits.md ]; then
            echo "# Mubashir AI Activity Log" > commits.md
            echo "" >> commits.md
            echo "Auto-generated from mubashirali.vercel.app scraping." >> commits.md
            echo "" >> commits.md
          fi

      - name: Scrape website content
        run: |
          echo "Fetching website..."

          HTML=$(curl -sL -A "Mozilla/5.0" https://mubashirali.vercel.app/)

          # Remove scripts/styles + tags
          TEXT=$(echo "$HTML" | sed 's/<script[^>]*>.*<\/script>//g' | sed 's/<style[^>]*>.*<\/style>//g' | sed 's/<[^>]*>/ /g')

          # Normalize spaces
          TEXT=$(echo "$TEXT" | tr -s ' ')

          # Pick meaningful sentence
          SENTENCE=$(echo "$TEXT" | tr '.' '\n' | grep -E '.{30,}' | shuf -n 1 || true)

          # Clean final output
          CLEAN=$(echo "$SENTENCE" | sed 's/^ *//;s/ *$//' | cut -c1-160)

          # fallback if empty
          if [ -z "$CLEAN" ]; then
            CLEAN="Mubashir Ali is actively working on AI, ML and Data Science projects."
          fi

          echo "### $(date '+%Y-%m-%d %H:%M:%S')" >> commits.md
          echo "- $CLEAN" >> commits.md
          echo "" >> commits.md

      - name: Commit and push
        run: |
          git config user.name "Mubashir Ali"
          git config user.email "mubashirali1837@gmail.com"

          git add commits.md

          git diff --cached --quiet || git commit -m "AI Scraper update from website"

          # Pull latest changes first just in case there were parallel commits
          git pull --rebase origin HEAD || true
          git push origin HEAD
