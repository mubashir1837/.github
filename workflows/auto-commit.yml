name: Mubashir AI Smart Activity Bot

on:
  schedule:
    - cron: "0 */2 * * *"   # every 2 hours (natural)
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl pup

      - name: Initialize file if not exists
        run: |
          if [ ! -f commits.md ]; then
            cat << 'EOF' > commits.md
# Service Activity Log (inside .github)

This file is automatically updated using data from mubashirali.vercel.app to reflect ongoing AI, ML, and Data Science work.

---

## Activity Log

EOF
          fi

      - name: Scrape website content
        run: |
          curl -s https://mubashirali.vercel.app/ > page.html

          # Extract text (basic scraping)
          CONTENT=$(cat page.html | tr -d '\n' | sed 's/<[^>]*>/ /g')

          # Pick random sentence (simple splitting)
          SENTENCE=$(echo "$CONTENT" | tr '.' '\n' | shuf -n 1)

          # Clean sentence length
          CLEAN=$(echo "$SENTENCE" | cut -c1-120)

          echo "### $(date '+%Y-%m-%d %H:%M:%S')" >> commits.md
          echo "- $CLEAN" >> commits.md
          echo "" >> commits.md

      - name: Commit & Push
        run: |
          git config --global user.name "Mubashir Ali"
          git config --global user.email "mubashir@users.noreply.github.com"

          git add commits.md
          git commit -m "Auto update from website content" || echo "No changes"
          git push
