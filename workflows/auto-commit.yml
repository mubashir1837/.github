name: Mubashir AI Smart Activity Bot

on:
  schedule:
    - cron: "0 */2 * * *"   # every 2 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl

      - name: Initialize commits.md if not exists
        run: |
          if [ ! -f commits.md ]; then
            echo "# Service Activity Log (inside .github)" >> commits.md
            echo "" >> commits.md
            echo "This file is automatically updated using data from mubashirali.vercel.app to reflect ongoing AI, ML, and Data Science work." >> commits.md
            echo "" >> commits.md
            echo "---" >> commits.md
            echo "" >> commits.md
            echo "## Activity Log" >> commits.md
            echo "" >> commits.md
          fi

      - name: Scrape website content
        run: |
          curl -s https://mubashirali.vercel.app/ > page.html

          # Remove HTML tags safely
          CONTENT=$(sed 's/<[^>]*>/ /g' page.html | tr -s ' ')

          # Split into sentences and pick random
          SENTENCE=$(echo "$CONTENT" | tr '.' '\n' | shuf -n 1)

          # Clean + limit length
          CLEAN=$(echo "$SENTENCE" | sed 's/^ *//;s/ *$//' | cut -c1-150)

          # Fallback if empty
          if [ -z "$CLEAN" ]; then
            CLEAN="Mubashir Ali is actively building AI, Machine Learning, and Data Science solutions."
          fi

          echo "### $(date '+%Y-%m-%d %H:%M:%S')" >> commits.md
          echo "- $CLEAN" >> commits.md
          echo "" >> commits.md

      - name: Commit and push changes
        run: |
          git config --global user.name "Mubashir Ali"
          git config --global user.email "mubashir@users.noreply.github.com"

          git add commits.md

          # Commit only if changes exist
          git diff --cached --quiet || git commit -m "Auto update from website content"

          git push
